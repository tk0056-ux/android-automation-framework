stages:
  - build
  - test
  - deploy

before_script:
  - chmod +x ./gradlew

build:
  stage: build
  script:
    - ./gradlew assembleDebug
  artifacts:
    paths:
      - app/build/outputs/apk/

test:
  stage: test
  script:
    - ./gradlew test

# 可选：自动部署到服务器
deploy:
  stage: deploy
  script:
    - echo "部署 APK 到服务器..."
    # 这里可以添加 scp 或其他部署命令
  only:
    - master